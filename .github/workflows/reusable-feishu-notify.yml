name: Reusable Feishu Notify (MoxHermes)

on:
  workflow_call:
    inputs:
      repo_name:
        required: true
        type: string
      repo_url:
        required: true
        type: string
      actor:
        required: true
        type: string
      branch:
        required: true
        type: string
      event_name:
        required: false
        type: string
        default: push
      commit_msg:
        required: false
        type: string
        default: ""
    secrets:
      FEISHU_APP_ID:
        required: true
      FEISHU_APP_SECRET:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification to Feishu group via Bot API
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          REPO_NAME: ${{ inputs.repo_name }}
          REPO_URL: ${{ inputs.repo_url }}
          ACTOR: ${{ inputs.actor }}
          BRANCH: ${{ inputs.branch }}
          EVENT_NAME: ${{ inputs.event_name }}
          COMMIT_MSG: ${{ inputs.commit_msg }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request
          from datetime import datetime

          APP_ID = os.environ["FEISHU_APP_ID"]
          APP_SECRET = os.environ["FEISHU_APP_SECRET"]
          GROUP_CHAT_ID = "oc_758bd8428500714ed58aabc5258cd34c"
          TEMPLATE_ID = "AAqtmKDOFxVxs"
          TEMPLATE_VERSION = "1.0.8"

          def api_post(url, data, token=None):
              headers = {"Content-Type": "application/json; charset=utf-8"}
              if token:
                  headers["Authorization"] = f"Bearer {token}"
              req = urllib.request.Request(
                  url,
                  data=json.dumps(data, ensure_ascii=False).encode("utf-8"),
                  headers=headers,
              )
              try:
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      return resp.getcode(), json.loads(resp.read().decode("utf-8"))
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8", errors="replace")
                  try:
                      parsed = json.loads(body)
                  except Exception:
                      parsed = {"raw": body}
                  return e.code, parsed

          code, token_resp = api_post(
              "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal",
              {"app_id": APP_ID, "app_secret": APP_SECRET},
          )
          if code != 200 or token_resp.get("code") != 0:
              raise SystemExit(f"❌ 获取 tenant_access_token 失败: {token_resp}")
          token = token_resp["tenant_access_token"]

          now = datetime.now().strftime("%Y-%m-%d %H:%M:%S")
          repo = os.environ["REPO_NAME"]
          url = os.environ["REPO_URL"]
          actor = os.environ["ACTOR"]
          branch = os.environ["BRANCH"]
          event_name = os.environ.get("EVENT_NAME", "push")
          msg = os.environ.get("COMMIT_MSG", "").strip() or f"{event_name} triggered by {actor}"

          template_card = {
              "type": "template",
              "data": {
                  "template_id": TEMPLATE_ID,
                  "template_version_name": TEMPLATE_VERSION,
                  "template_variable": {
                      "update_text": "提交更新",
                      "repo_name": repo,
                      "updated_at": now,
                      "actor_name": actor,
                      "ref_branch": branch,
                      "message_title": "更新内容",
                      "message_body": msg,
                      "ref_name": {
                          "url": url,
                          "pc_url": url,
                          "ios_url": url,
                          "android_url": url,
                      },
                  },
              },
          }

          fallback_card = {
              "config": {"wide_screen_mode": True},
              "header": {
                  "title": {"tag": "plain_text", "content": f"📦 {repo} 更新通知"},
                  "template": "blue",
              },
              "elements": [
                  {
                      "tag": "div",
                      "text": {
                          "tag": "lark_md",
                          "content": (
                              f"**仓库：** [{repo}]({url})\n"
                              f"**分支：** `{branch}`\n"
                              f"**操作人：** {actor}\n"
                              f"**时间：** {now}\n\n"
                              f"**提交信息：**\n{msg}"
                          ),
                      },
                  }
              ],
          }

          def send_card(card):
              return api_post(
                  "https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=chat_id",
                  {
                      "receive_id": GROUP_CHAT_ID,
                      "msg_type": "interactive",
                      "content": json.dumps(card, ensure_ascii=False),
                  },
                  token,
              )

          code, result = send_card(template_card)
          if code == 200 and result.get("code") == 0:
              print("✅ 通知发送成功（旧模板卡片）")
              raise SystemExit(0)

          err_text = json.dumps(result, ensure_ascii=False)
          print(f"⚠️ 旧模板发送失败，准备降级: {err_text}")

          code, result = send_card(fallback_card)
          if code == 200 and result.get("code") == 0:
              print("✅ 通知发送成功（降级普通卡片）")
              raise SystemExit(0)

          raise SystemExit(f"❌ 通知发送失败: {result}")
          PY
